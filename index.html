<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="网络安全学习博客 — 记录渗透测试、Web安全、CTF等学习笔记">
  <title>0xBlog — 网络安全学习笔记</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>🛡️</text></svg>">
</head>
<body>
  <!-- 顶部导航 -->
  <header class="site-header">
    <div class="container header-inner">
      <a href="/" class="logo">
        <span class="logo-icon">⟩_</span>
        <span class="logo-text">0xBlog</span>
      </a>
      <nav class="main-nav">
        <a href="#" class="nav-link active" data-nav="home">首页</a>
        <a href="#" class="nav-link" data-nav="archive">归档</a>
        <a href="#" class="nav-link" data-nav="about">关于</a>
      </nav>
      <div class="header-actions">
        <button id="themeToggle" class="btn-icon" title="切换主题" aria-label="切换主题">
          <span class="icon-sun">☀️</span>
          <span class="icon-moon">🌙</span>
        </button>
        <button id="menuToggle" class="btn-icon hamburger" aria-label="菜单">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <!-- 移动端菜单 -->
  <div id="mobileMenu" class="mobile-menu">
    <a href="#" class="mobile-link" data-nav="home">首页</a>
    <a href="#" class="mobile-link" data-nav="archive">归档</a>
    <a href="#" class="mobile-link" data-nav="about">关于</a>
  </div>

  <!-- 主内容区域 -->
  <main class="site-main">
    <div class="container main-layout">

      <!-- 文章列表 -->
      <section id="homeSection" class="content-area">
        <!-- 搜索和筛选 -->
        <div class="search-bar">
          <input type="text" id="searchInput" placeholder="搜索文章..." class="search-input">
          <div class="tag-filter" id="tagFilter">
            <button class="tag-btn active" data-tag="all">全部</button>
            <!-- 动态生成标签 -->
          </div>
        </div>

        <div id="postList" class="post-list">
          <!-- 动态生成文章卡片 -->
        </div>

        <div id="pagination" class="pagination"></div>
      </section>

      <!-- 归档页面 -->
      <section id="archiveSection" class="content-area" style="display:none;">
        <h2 class="section-title">📂 文章归档</h2>
        <div id="archiveList" class="archive-list"></div>
      </section>

      <!-- 关于页面 -->
      <section id="aboutSection" class="content-area" style="display:none;">
        <div class="about-card">
          <div class="about-avatar">🛡️</div>
          <h2>关于我</h2>
          <p>一名网络安全学习者，这里记录我的学习笔记、漏洞复现、工具使用和 CTF 解题思路。</p>
          <div class="about-skills">
            <h3>学习方向</h3>
            <div class="skill-tags">
              <span>Web安全</span><span>渗透测试</span><span>代码审计</span>
              <span>内网渗透</span><span>CTF</span><span>漏洞复现</span>
              <span>Python安全</span><span>云安全</span>
            </div>
          </div>
          <div class="about-links">
            <a href="https://github.com" target="_blank" rel="noopener">🐙 GitHub</a>
            <a href="#" onclick="return false;">📧 联系方式</a>
          </div>
        </div>
      </section>

      <!-- 侧边栏 -->
      <aside class="sidebar">
        <div class="sidebar-card">
          <h3>👤 关于博主</h3>
          <p>网络安全学习者，记录成长路上的每一步。</p>
        </div>
        <div class="sidebar-card">
          <h3>🏷️ 热门标签</h3>
          <div class="hot-tags" id="hotTags"></div>
        </div>
        <div class="sidebar-card">
          <h3>📅 最新文章</h3>
          <ul class="recent-posts" id="recentPosts"></ul>
        </div>
      </aside>
    </div>
  </main>

  <!-- 页脚 -->
  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© 2026 0xBlog — 网络安全学习笔记</p>
      <p class="footer-sub">Keep Learning · Keep Hacking (Ethically)</p>
    </div>
  </footer>

  <!-- 回到顶部 -->
  <button id="backToTop" class="btn-back-top" title="回到顶部">↑</button>

  <script src="js/blog.js"></script>
</body>
</html>
